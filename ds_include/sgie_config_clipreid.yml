property:
  gpu-id: 0
  # CLIP-ReID's own preprocessing (datasets/make_dataloader_clipreid.py):
  # RGB, ToTensor() -> [0,1], Normalize(mean=[0.5,0.5,0.5], std=[0.5,0.5,0.5])
  # == pixel/127.5 - 1. Exact (not the single-scalar approximation the
  # ImageNet-trained osnet/resnet configs need, since CLIP-ReID's mean/std are
  # equal across channels).
  net-scale-factor: 0.00784313725490196
  offsets: 127.5;127.5;127.5
  model-color-format: 0
  onnx-file: /home/lakshh/workspace/reid/impl_bot/bot_sort_ds_impl/ds_include/onnx_model/clipreid_vitb16_market1501.onnx
  model-engine-file: /home/lakshh/workspace/reid/impl_bot/bot_sort_ds_impl/ds_include/onnx_model/clipreid_vitb16_market1501.onnx_b32_gpu0_fp16.engine
  infer-dims: 3;256;128
  batch-size: 32
  network-mode: 2
  network-type: 100
  interval: 0
  process-mode: 2
  classifier-threshold: 0
  output-tensor-meta: 1
  maintain-aspect-ratio: 0
  operate-on-class-ids: 0
  scaling-compute-hw: 1
  # 3, not 2: sgie_config.yml (the ReIdentificationNet model) already claims
  # gie-unique-id 2. Both now run simultaneously in the same pipeline (see
  # app_config.yml's secondary-gie-1/secondary-gie-2 and
  # ds_global_tracklet_association.py's GIE_STREAM_NAMES, which maps this id
  # to the "clipreid" stream) - a collision here would make DeepStream
  # silently conflate the two models' tensor output metadata on the same
  # object.
  gie-unique-id: 3
  # Only attach output to objects the PRIMARY detector created, not to
  # whatever secondary-gie-1 (reidnet) attaches - both sgies are pure
  # classifiers (process-mode: 2), so this only matters for meta bookkeeping
  # clarity now that two secondary GIEs are chained, not correctness of
  # which objects get processed.
  operate-on-gie-id: 1
